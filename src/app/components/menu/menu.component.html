<div class="menu-container" *ngIf="isOpen" @bounceIn>
	<ul>
		<li><a (click)="navigateTo('/lists')">Lists</a></li>
		<li><a (click)="navigateTo('/profile')">Profile</a></li>
		@if (installService.isAndroid && installService.canInstall()) {
			<li><a (click)="createShortcut()">Install as App</a></li>
		}
		@if (installService.isIos && !installService.isStandalone) {
			<li><a (click)="showIosInstall()">Install as App</a></li>
		}
		<li><a (click)="logout()">Logout</a></li>
	</ul>
</div>
