<svg width="80" height="80" viewBox="0 0 80 80" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Checked checkbox</title>
  <desc>A green embossed checked checkbox with bold overflowing checkmark</desc>
  <defs>
    <linearGradient id="c-face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#34c234"/>
      <stop offset="40%"  stop-color="#228b22"/>
      <stop offset="100%" stop-color="#145014"/>
    </linearGradient>
    <linearGradient id="c-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#c8e8c8"/>
      <stop offset="100%" stop-color="#6a9a6a"/>
    </linearGradient>
    <linearGradient id="c-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="white" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="drop" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#00000077"/>
    </filter>
    <filter id="ck-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#00000066"/>
    </filter>
    <clipPath id="c-clip"><rect x="11" y="11" width="58" height="58" rx="11"/></clipPath>
  </defs>

  <!-- Shadow -->
  <rect x="0" y="0" width="80" height="80" rx="20" fill="#000" filter="url(#drop)" opacity="0.6"/>
  <!-- Ring -->
  <rect x="0" y="0" width="80" height="80" rx="20" fill="url(#c-ring)"/>
  <!-- Inner face -->
  <rect x="11" y="11" width="58" height="58" rx="11" fill="url(#c-face)" stroke="#0a2a0a" stroke-width="1"/>
  <!-- Inner bottom depth -->
  <rect x="11" y="47" width="58" height="22" rx="0" fill="#071507" opacity="0.4" clip-path="url(#c-clip)"/>
  <!-- Inner shine -->
  <rect x="11" y="11" width="58" height="26" rx="11" fill="url(#c-shine)" clip-path="url(#c-clip)"/>
  <!-- Ring top shine -->
  <rect x="3" y="2" width="74" height="20" rx="16" fill="white" opacity="0.3"/>

  <!-- Checkmark shadow -->
  <polyline points="8,42 25,60 78,0" fill="none" stroke="#00000055" stroke-width="11" stroke-linecap="round" stroke-linejoin="round" transform="translate(1,3)" filter="url(#ck-shadow)"/>
  <!-- Checkmark -->
  <polyline points="8,42 25,60 78,0" fill="none" stroke="white" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Checkmark highlight -->
  <polyline points="8,42 25,60 78,0" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
